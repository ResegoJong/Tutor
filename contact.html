<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Book a Session</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo"><img src="logo.png" alt="Logo"></div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="reservations.html">Reservations</a>
            <a href="contact.html" class="active-link">Contact</a>
            <a href="contact.html" class="btn-book active-link-btn">BOOK A SESSION</a>
        </nav>
        <button class="menu-toggle" id="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        <div class="mobile-nav-panel" id="mobile-nav-panel">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="reservations.html">Reservations</a>
            <a href="contact.html" class="active-link">Contact</a>
            <a href="contact.html" class="btn-book-mobile">BOOK A SESSION</a>
        </div>
    </header>

  

    <section class="contact-section" id="contact-target">
        <div class="contact-grid-container">
            <div class="contact-left-side">
                <h2>SEND A MESSAGE</h2>
                
                <form class="message-form" action="mailto:yourcompanyemail@domain.com" method="post" enctype="text/plain">
                    <div class="form-group"><input type="text" name="Name" placeholder="Name" required></div>
                    <div class="form-group"><input type="email" name="Email" placeholder="Email" required></div>
                    <div class="form-group"><input type="text" name="Subject" placeholder="Subject"></div>
                    <div class="form-group"><textarea name="Message" placeholder="Message" rows="5" required></textarea></div>
                    <button type="submit" class="btn-submit">SEND</button>
                </form>

                <div class="action-buttons-container">
                    <a href="https://wa.me/26770000000" class="btn-action btn-whatsapp" target="_blank">
                        WHATSAPP ME NOW <i class="fab fa-whatsapp"></i>
                    </a>
                    <a href="#scheduler" class="btn-action btn-consultation">SCHEDULE A FREE CONSULTATION</a>
                </div>
            </div>

            <div class="contact-right-side" id="scheduler">
                <div class="calendly-mock-card">
                    <div class="calendly-header"><span><i class="far fa-calendar-alt"></i> Calendly Scheduler</span></div>
                    <div class="calendly-body">
                        <div class="calendly-date-selector">
                            <button class="cal-arrow"><i class="fas fa-chevron-left"></i></button>
                            <span class="cal-date-text">Available Slots</span>
                            <button class="cal-arrow"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <div class="slots-table-header"><span>SLOT TYPE</span><span>AVAILABLE TIME</span></div>
                        <div class="slots-list">
                            <div class="slot-row"><span class="slot-name">Morning Slot</span><div class="slot-times"><button class="time-pill">9:00 AM</button></div></div>
                            <div class="slot-row"><span class="slot-name">Afternoon Slot</span><div class="slot-times"><button class="time-pill">3:30 PM</button></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
